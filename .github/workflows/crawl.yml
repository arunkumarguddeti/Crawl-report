# ─────────────────────────────────────────────────────────────────────────────
#  crawl.yml — Ad-Hoc Crawler (Any URL) with Checkpoint / Resume
#
#  - Manual trigger only (workflow_dispatch)
#  - Auto-chains to itself if crawl exceeds 5h45m (Option 3)
#  - On final run: deploys to GitHub Pages + sends email
#  - Intermediate runs: save checkpoint artifact, auto-dispatch next run
# ─────────────────────────────────────────────────────────────────────────────
name: 🔍 Ad-Hoc Crawler (Any URL)

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'URL to crawl (required) — e.g. https://www.anysite.com'
        required: true
        default: ''

      scan_mode:
        description: 'Scan mode'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - targeted

      target_pages:
        description: '[TARGETED ONLY] Comma-separated page URLs'
        required: false
        default: ''

      scan_label:
        description: 'Optional label shown in report (e.g. "Client audit")'
        required: false
        default: ''

      max_depth:
        description: 'Max crawl depth'
        required: false
        default: '8'

      max_pages:
        description: 'Max pages to crawl (0 = unlimited)'
        required: false
        default: '0'

      max_queue:
        description: 'Max BFS queue size — lower prevents Drupal search/facet runaway (default: 20000)'
        required: false
        default: '20000'

      extra_trap_patterns:
        description: 'Extra comma-separated URL path substrings to exclude from crawling (e.g. /events/,/news/)'
        required: false
        default: ''

      concurrency:
        description: 'Parallel workers (use 3 for slow/polite crawl)'
        required: false
        default: '10'

      resume_from_run_id:
        description: '⚙️ AUTO-FILLED — Run ID to resume checkpoint from (leave blank for new scan)'
        required: false
        default: ''

      resume_run_count:
        description: '⚙️ AUTO-FILLED — Chain run count (leave blank for new scan)'
        required: false
        default: '1'

permissions:
  contents: write
  pages: write
  id-token: write
  actions: write # required for auto-dispatch of next chain run

concurrency:
  group: crawl-adhoc-${{ github.ref }}
  cancel-in-progress: false

jobs:
  crawl-adhoc:
    name: Ad-Hoc Crawl — ${{ github.event.inputs.base_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Check actor permission
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.actor }}" != "${{ github.repository_owner }}" ]; then
            echo "❌ Unauthorized: only the repo owner can trigger this workflow manually."
            exit 1
          fi
          echo "✅ Authorized: ${{ github.actor }}"

      - name: Validate inputs
        run: |
          if [ -z "${{ github.event.inputs.base_url }}" ]; then
            echo "❌ base_url is required for ad-hoc crawl"
            exit 1
          fi
          MODE="${{ github.event.inputs.scan_mode }}"
          PAGES="${{ github.event.inputs.target_pages }}"
          if [ "$MODE" = "targeted" ] && [ -z "$PAGES" ]; then
            echo "❌ scan_mode is 'targeted' but target_pages is empty"
            exit 1
          fi
          RUN_ID="${{ github.event.inputs.resume_from_run_id }}"
          RUN_COUNT="${{ github.event.inputs.resume_run_count }}"
          if [ -n "$RUN_ID" ]; then
            echo "🔁 RESUMING from run #${RUN_ID} (chain run ${RUN_COUNT})"
          else
            echo "🆕 NEW SCAN — URL: ${{ github.event.inputs.base_url }}"
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download checkpoint from previous run
        if: github.event.inputs.resume_from_run_id != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID="${{ github.event.inputs.resume_from_run_id }}"
          echo "📥 Downloading checkpoint artifact from run ${RUN_ID}..."
          mkdir -p ./checkpoint
          gh run download "${RUN_ID}" \
            --repo "${{ github.repository }}" \
            --name "crawl-checkpoint" \
            --dir ./checkpoint || {
            echo "❌ Failed to download checkpoint from run ${RUN_ID}"
            exit 1
          }
          ls -lh ./checkpoint/
          echo "✅ Checkpoint downloaded"

      - name: Run crawler
        env:
          BASE_URL:            ${{ github.event.inputs.base_url }}
          TARGET_PAGES:        ${{ github.event.inputs.target_pages || '' }}
          SCAN_LABEL:          ${{ github.event.inputs.scan_label || '' }}
          MAX_DEPTH:           ${{ github.event.inputs.max_depth || '8' }}
          MAX_PAGES:           ${{ github.event.inputs.max_pages || '0' }}
          MAX_QUEUE:           ${{ github.event.inputs.max_queue || '20000' }}
          CONCURRENCY:         ${{ github.event.inputs.concurrency || '10' }}
          # Append any extra user-supplied trap patterns to the crawler defaults.
          # The crawler reads TRAP_PATTERNS as comma-separated substrings.
          # When extra_trap_patterns is blank the env var stays empty and the
          # crawler falls back to its built-in Drupal-aware defaults.
          TRAP_PATTERNS:       ${{ github.event.inputs.extra_trap_patterns || '' }}
          TIMEOUT:             '10'
          POLITE_DELAY:        '0.3'
          RESPECT_ROBOTS:      'true'
          OUTPUT_DIR:          './reports'
          CRAWL_TIMEOUT_SECS:  '300'
          CHECKPOINT_IN:       ${{ github.event.inputs.resume_from_run_id != '' && './checkpoint/checkpoint.json' || '' }}
          CHECKPOINT_OUT:      './reports/checkpoint.json'
          RESUME_RUN_COUNT:    ${{ github.event.inputs.resume_run_count || '1' }}
        run: python crawler.py

      - name: Check if checkpoint was saved
        id: check_checkpoint
        run: |
          if [ -f reports/checkpoint_saved.txt ]; then
            VAL=$(cat reports/checkpoint_saved.txt)
          else
            VAL="false"
          fi
          echo "checkpoint_saved=${VAL}" >> $GITHUB_OUTPUT
          echo "Checkpoint saved: ${VAL}"

      - name: Upload checkpoint artifact
        if: steps.check_checkpoint.outputs.checkpoint_saved == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: crawl-checkpoint
          path: reports/checkpoint.json
          retention-days: 7

      - name: Upload ZIP artifact (partial or final results)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: adhoc-run-${{ github.run_number }}-${{ github.event.inputs.scan_label || 'scan' }}
          path: |
            reports/*.html
            reports/*.csv
            reports/*.xlsx
          retention-days: 30

      - name: Auto-dispatch next run (chain)
        if: steps.check_checkpoint.outputs.checkpoint_saved == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEXT_COUNT=$(( ${{ github.event.inputs.resume_run_count || '1' }} + 1 ))
          echo "🚀 Checkpoint saved — auto-dispatching chain run ${NEXT_COUNT}..."
          gh workflow run crawl.yml \
            --repo "${{ github.repository }}" \
            --ref "${{ github.ref }}" \
            --field "base_url=${{ github.event.inputs.base_url }}" \
            --field "scan_mode=${{ github.event.inputs.scan_mode }}" \
            --field "target_pages=${{ github.event.inputs.target_pages }}" \
            --field "scan_label=${{ github.event.inputs.scan_label }}" \
            --field "max_depth=${{ github.event.inputs.max_depth }}" \
            --field "max_pages=${{ github.event.inputs.max_pages }}" \
            --field "concurrency=${{ github.event.inputs.concurrency }}" \
            --field "resume_from_run_id=${{ github.run_id }}" \
            --field "resume_run_count=${NEXT_COUNT}"
          echo "✅ Chain run ${NEXT_COUNT} dispatched — this run is complete"

      # ── Steps below only run on the FINAL run (no checkpoint saved) ──────────

      - name: Include archive in Pages deployment
        if: steps.check_checkpoint.outputs.checkpoint_saved != 'true'
        run: |
          if git fetch origin gh-pages 2>/dev/null; then
            mkdir -p reports/archive
            git checkout origin/gh-pages -- archive/ 2>/dev/null || true
            cp -r archive/. reports/archive/ 2>/dev/null || true
            echo "✅ Archive included in Pages deployment"
          else
            echo "No gh-pages branch yet — skipping archive copy"
          fi

      - name: Archive report to gh-pages
        if: steps.check_checkpoint.outputs.checkpoint_saved != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git fetch origin gh-pages 2>/dev/null; then
            git worktree add /tmp/gh-pages origin/gh-pages
          else
            echo "gh-pages does not exist yet — creating it"
            git worktree add --orphan -b gh-pages /tmp/gh-pages
            cd /tmp/gh-pages
            git commit --allow-empty -m "Initialize gh-pages branch"
            git push origin gh-pages
            cd -
          fi
          mkdir -p /tmp/gh-pages/archive/adhoc
          for f in reports/*.html; do
            [ "$f" = "reports/index.html" ] && continue
            size=$(stat -c%s "$f" 2>/dev/null || echo 0)
            if [ "$size" -lt 52428800 ]; then
              cp "$f" /tmp/gh-pages/archive/adhoc/
            else
              echo "Skipping $f — too large (${size} bytes)"
            fi
          done
          find /tmp/gh-pages/archive/adhoc -type f -mtime +30 -delete 2>/dev/null || true
          cd /tmp/gh-pages
          python3 - << 'PYEOF'
          import re
          from pathlib import Path
          files = sorted(Path("archive/adhoc").glob("report_*.html"), reverse=True)
          rows = ""
          for f in files[:50]:
              name = f.name
              m = re.search(r"(\d{4})(\d{2})(\d{2})_(\d{2})(\d{2})(\d{2})", name)
              label = f"{m.group(1)}-{m.group(2)}-{m.group(3)} {m.group(4)}:{m.group(5)}:{m.group(6)} EST" if m else name
              rows += f'<tr><td><a href="{name}">{label}</a></td><td>{name}</td></tr>\n'
          html = f"""<!DOCTYPE html><html><head><meta charset="UTF-8">
          <title>Ad-Hoc Archive</title>
          <style>body{{font-family:sans-serif;background:#0f172a;color:#e2e8f0;padding:30px}}
          a{{color:#60a5fa}}table{{width:100%;border-collapse:collapse;margin-top:20px}}
          th,td{{padding:10px 14px;border:1px solid #334155}}th{{background:#1e293b}}
          tr:hover{{background:#1e293b}}</style></head>
          <body><h1>🔍 Ad-Hoc Report Archive</h1>
          <p>{len(files)} reports · auto-deleted after 30 days</p>
          <table><thead><tr><th>Run Date (EST)</th><th>File</th></tr></thead>
          <tbody>{rows}</tbody></table></body></html>"""
          Path("archive/adhoc/index.html").write_text(html)
          PYEOF
          git add -A
          git diff --cached --quiet || git commit -m "Archive adhoc $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push origin HEAD:gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to GitHub Pages
        if: steps.check_checkpoint.outputs.checkpoint_saved != 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./reports

      - name: Deploy to GitHub Pages
        if: steps.check_checkpoint.outputs.checkpoint_saved != 'true'
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Read crawl stats
        if: steps.check_checkpoint.outputs.checkpoint_saved != 'true' && always()
        id: stats
        run: |
          if [ -f reports/summary.json ]; then
            python3 -c "
          import json
          s = json.load(open('reports/summary.json'))
          print('PAGES='    + str(s['pages']))
          print('TOTAL='    + str(s['total_links']))
          print('OK='       + str(s['ok']))
          print('BROKEN='   + str(s['broken']))
          print('REDIRECTS='+ str(s['redirects']))
          print('ERRORS='   + str(s['server_errors']))
          print('TIMEOUTS=' + str(s['timeouts']))
          print('INTERNAL=' + str(s['internal']))
          print('EXTERNAL=' + str(s['external']))
          print('DURATION=' + str(s['duration']))
          print('RUN_DATE=' + str(s['run_date']))
          print('RUN_COUNT='+ str(s.get('run_count', 1)))
          " >> $GITHUB_OUTPUT
          fi

      - name: Send email (final run only)
        if: steps.check_checkpoint.outputs.checkpoint_saved != 'true' && always()
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_TO }}
          from: Crawl Reports <${{ secrets.MAIL_USERNAME }}>
          subject: "Broken Link Report — ${{ github.event.inputs.base_url }} — ${{ job.status }}"
          convert_markdown: false
          body: |
            Broken Link Report
            Site:      ${{ github.event.inputs.base_url }}
            Mode:      ${{ github.event.inputs.scan_mode }}
            Run Date:  ${{ steps.stats.outputs.RUN_DATE }}
            Duration:  ${{ steps.stats.outputs.DURATION }}
            Chain Runs: ${{ steps.stats.outputs.RUN_COUNT }}

            ══════════════════════════════════════════
              CRAWL RESULTS
            ══════════════════════════════════════════
              Parent Pages:     ${{ steps.stats.outputs.PAGES }}
              Total Links:      ${{ steps.stats.outputs.TOTAL }}
            ──────────────────────────────────────────
              200 OK:           ${{ steps.stats.outputs.OK }}
              Broken (404/410): ${{ steps.stats.outputs.BROKEN }}
              Redirects (3xx):  ${{ steps.stats.outputs.REDIRECTS }}
              Server Errors:    ${{ steps.stats.outputs.ERRORS }}
              Timeout / Error:  ${{ steps.stats.outputs.TIMEOUTS }}
            ──────────────────────────────────────────
              Internal Links:   ${{ steps.stats.outputs.INTERNAL }}
              External Links:   ${{ steps.stats.outputs.EXTERNAL }}
            ══════════════════════════════════════════

            View Live Report:
            ${{ steps.deployment.outputs.page_url }}

            Browse Archive:
            https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/archive/adhoc/

            Download ZIP (HTML + CSV + Excel):
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ──────────────────────────────────────────
            Run #${{ github.run_number }} | Status: ${{ job.status }}

      - name: Write job summary
        if: always()
        run: |
          CKPT="${{ steps.check_checkpoint.outputs.checkpoint_saved }}"
          if [ "$CKPT" = "true" ]; then
            echo "## ⏸️ Checkpoint Saved — Chain Run ${{ github.event.inputs.resume_run_count || '1' }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Crawl paused at 5h45m. Next run auto-dispatched and will resume automatically." >> $GITHUB_STEP_SUMMARY
          else
            echo "## ✅ Ad-Hoc Crawl Complete" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | Link |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 URL Crawled | ${{ github.event.inputs.base_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📊 Live Report | ${{ steps.deployment.outputs.page_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📂 Archive | https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/archive/adhoc/ |" >> $GITHUB_STEP_SUMMARY
          echo "| 📁 ZIP Artifact | https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          ls -lh reports/ | awk 'NR>1 {print "| " $9 " | " $5 " |"}' >> $GITHUB_STEP_SUMMARY || true
