name: Broken Link Crawler

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Website URL to crawl'
        required: true
        default: 'https://www.example.com'
      max_depth:
        description: 'Maximum crawl depth'
        required: false
        default: '8'
      max_pages:
        description: 'Hard cap on pages'
        required: false
        default: '3000'
      concurrency:
        description: 'Parallel workers'
        required: false
        default: '10'
  schedule:
    - cron: '0 8 * * 1'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  crawl:
    name: Run Crawler
    runs-on: ubuntu-latest
    timeout-minutes: 360
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run broken link crawler
        env:
          BASE_URL: ${{ github.event.inputs.base_url || 'https://www.example.com' }}
          MAX_DEPTH: ${{ github.event.inputs.max_depth || '8' }}
          MAX_PAGES: ${{ github.event.inputs.max_pages || '3000' }}
          CONCURRENCY: ${{ github.event.inputs.concurrency || '10' }}
          TIMEOUT: '10'
          POLITE_DELAY: '0.3'
          RESPECT_ROBOTS: 'true'
          OUTPUT_DIR: './reports'
        run: |
          python crawler.py

      - name: Verify reports folder
        run: |
          echo "=== Files in reports/ ==="
          ls -lh reports/
          echo "=== Checking index.html exists ==="
          test -f reports/index.html && echo "✅ index.html found" || echo "❌ index.html MISSING"

      - name: Upload ZIP artifact (download from Actions tab)
        uses: actions/upload-artifact@v4
        if: always()
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          name: broken-link-report-${{ github.run_number }}
          path: |
            reports/*.html
            reports/*.csv
          retention-days: 30

      - name: Upload report to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./reports

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Write job summary
        if: always()
        run: |
          echo "## ✅ Crawl Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Live report URL:** ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          ls -lh reports/ | awk 'NR>1 {print "| " $9 " | " $5 " |"}' >> $GITHUB_STEP_SUMMARY || true
