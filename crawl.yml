# .github/workflows/crawl.yml
#
# Website Broken Link Crawler — GitHub Actions Workflow
#
# TRIGGERS:
#   1. Manual run (workflow_dispatch) — enter BASE_URL in GitHub UI
#   2. Scheduled weekly run (every Monday 08:00 UTC)
#   3. Push to main — runs on every deploy (optional, disabled by default)
#
# COST:
#   • Public repository  → 100% FREE, unlimited minutes
#   • Private repository → consumes from your FREE quota (2,000 min/month on Free plan)
#     A 2–4 hour crawl uses 120–240 of those free minutes — well within the quota.
#     Set a spending limit of $0 in Settings > Billing to ensure you are never charged.

name: 🔍 Broken Link Crawler

on:
  # ── 1. Manual trigger — run any time from the GitHub Actions tab ──────────────
  workflow_dispatch:
    inputs:
      base_url:
        description: "Website URL to crawl (e.g. https://www.example.com)"
        required: true
        default:  "https://www.example.com"
      max_depth:
        description: "Maximum crawl depth (recommended: 5–10)"
        required: false
        default:  "8"
      max_pages:
        description: "Hard cap on pages to crawl (recommended: 2000–10000)"
        required: false
        default:  "3000"
      concurrency:
        description: "Parallel workers (10 = fast + polite)"
        required: false
        default:  "10"

  # ── 2. Scheduled weekly crawl ─────────────────────────────────────────────────
  schedule:
    - cron: "0 8 * * 1"   # Every Monday at 08:00 UTC

  # ── 3. Optional: run on every push to main (uncomment to enable) ──────────────
  # push:
  #   branches: [main]

# ─────────────────────────────────────────────────────────────────────────────
jobs:
  crawl:
    name: Run Crawler & Generate Report
    runs-on: ubuntu-latest          # Free Linux runner — fastest option
    timeout-minutes: 360            # 6-hour hard cap (safety net)

    permissions:
      contents: write               # Needed only if deploying to GitHub Pages
      pages: write                  # Needed only if deploying to GitHub Pages
      id-token: write               # Needed only if deploying to GitHub Pages

    steps:
      # ── Step 1: Checkout repo ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 2: Set up Python 3.11 ─────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"              # Caches pip packages between runs (faster)

      # ── Step 3: Install Python dependencies ────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Step 4: Run the crawler ─────────────────────────────────────────────
      #    Environment variables override the CONFIG dict in crawler.py
      - name: Run broken link crawler
        env:
          BASE_URL:    ${{ github.event.inputs.base_url    || vars.DEFAULT_BASE_URL || 'https://www.example.com' }}
          MAX_DEPTH:   ${{ github.event.inputs.max_depth   || '8' }}
          MAX_PAGES:   ${{ github.event.inputs.max_pages   || '3000' }}
          CONCURRENCY: ${{ github.event.inputs.concurrency || '10' }}
          TIMEOUT:     "10"
          POLITE_DELAY: "0.3"
          RESPECT_ROBOTS: "true"
          OUTPUT_DIR:  "./reports"
        run: |
          python crawler.py

      # ── Step 5: Upload reports as downloadable artifacts ───────────────────
      #    After the run, go to: Actions > your run > Artifacts section to download
      - name: Upload HTML report as artifact
        uses: actions/upload-artifact@v4
        if: always()                # Upload even if crawl had errors
        with:
          name: broken-link-report-${{ github.run_number }}
          path: |
            reports/*.html
            reports/*.csv
          retention-days: 30        # Keep reports for 30 days (free storage)

      # ── Step 6: Print summary to GitHub Actions job summary ────────────────
      - name: Print summary
        if: always()
        run: |
          echo "## Reports Generated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Reports saved to \`./reports/\` directory." >> $GITHUB_STEP_SUMMARY
          echo "Download the artifact above to view the HTML report." >> $GITHUB_STEP_SUMMARY
          ls -lh reports/ >> $GITHUB_STEP_SUMMARY || echo "No reports directory found."

      # ── Step 7 (OPTIONAL): Deploy HTML report to GitHub Pages ──────────────
      # Uncomment this block to publish the latest report to:
      # https://<your-username>.github.io/<your-repo>/
      #
      # SETUP REQUIRED:
      #   Go to: Settings > Pages > Source > GitHub Actions
